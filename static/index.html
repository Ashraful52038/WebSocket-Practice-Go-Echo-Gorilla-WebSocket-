<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Real-Time Communication Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .client-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .client-id-box {
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.connected {
            background: #4caf50;
            box-shadow: 0 0 5px #4caf50;
        }
        
        .status-indicator.disconnected {
            background: #f44336;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button.danger {
            background: #f44336;
        }
        
        button.danger:hover {
            background: #da190b;
        }
        
        button.success {
            background: #4caf50;
        }
        
        button.success:hover {
            background: #45a049;
        }
        
        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .button-group button {
            flex: 1;
        }
        
        /* Messages Area */
        .messages-area {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .messages-header h3 {
            color: #333;
        }
        
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
        }
        
        .message {
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .message.unicast {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
        }
        
        .message.broadcast {
            background: #f3e5f5;
            border-left: 4px solid #9c27b0;
        }
        
        .message.multicast {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }
        
        .message.system {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            font-style: italic;
        }
        
        .message.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }
        
        .message-time {
            font-size: 11px;
            color: #999;
            margin-bottom: 5px;
        }
        
        .message-content {
            word-wrap: break-word;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        /* Online Users */
        .online-users {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .user-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .user-item {
            padding: 8px 10px;
            margin: 5px 0;
            background: #f0f0f0;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-family: monospace;
            font-size: 12px;
        }
        
        .user-item:hover {
            background: #e0e0e0;
        }
        
        .user-item.current {
            background: #667eea;
            color: white;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .client-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="client-info">
                <div>
                    <strong>🎯 Your Client ID:</strong>
                    <div class="client-id-box" id="clientId">Connecting...</div>
                </div>
                <div class="status">
                    <div class="status-indicator disconnected" id="statusIndicator"></div>
                    <span id="statusText">Disconnected</span>
                    <button onclick="copyClientId()" id="copyBtn" disabled>📋 Copy ID</button>
                    <button onclick="reconnect()" id="reconnectBtn">🔄 Reconnect</button>
                    <button onclick="clearMessages()" class="danger">🗑️ Clear Messages</button>
                </div>
            </div>
        </div>
        
        <!-- Main Grid -->
        <div class="grid">
            <!-- Unicast Card -->
            <div class="card">
                <h3>🔵 Unicast (Private Message)</h3>
                <div class="input-group">
                    <label>Target Client ID:</label>
                    <input type="text" id="unicastTarget" placeholder="Paste client ID here...">
                </div>
                <div class="input-group">
                    <label>Message:</label>
                    <input type="text" id="unicastMsg" placeholder="Type your private message..." 
                           onkeypress="if(event.key==='Enter') sendUnicast()">
                </div>
                <button onclick="sendUnicast()" id="unicastBtn" disabled>📨 Send Private</button>
                <div class="quick-actions">
                    <button onclick="fillCurrentClientId()" class="success">📋 Use My ID</button>
                </div>
            </div>
            
            <!-- Broadcast Card -->
            <div class="card">
                <h3>🟣 Broadcast (To Everyone)</h3>
                <div class="input-group">
                    <label>Message to all clients:</label>
                    <input type="text" id="broadcastMsg" placeholder="Type announcement..." 
                           onkeypress="if(event.key==='Enter') sendBroadcast()">
                </div>
                <button onclick="sendBroadcast()" id="broadcastBtn" disabled>📢 Broadcast</button>
                <div class="quick-actions">
                    <button onclick="sendSampleBroadcast()">🎲 Sample Message</button>
                </div>
            </div>
            
            <!-- Multicast Card -->
            <div class="card">
                <h3>🟢 Multicast (Room Based)</h3>
                <div class="input-group">
                    <label>Room Name:</label>
                    <input type="text" id="roomName" placeholder="e.g., gaming, coding, general" 
                           value="general">
                </div>
                <div class="button-group">
                    <button onclick="joinRoom()" id="joinRoomBtn" disabled>🚪 Join Room</button>
                    <button onclick="leaveRoom()" id="leaveRoomBtn" disabled>🚶 Leave Room</button>
                </div>
                <div class="input-group">
                    <label>Current Room:</label>
                    <div style="padding: 8px; background: #f0f0f0; border-radius: 5px;" id="currentRoom">
                        None
                    </div>
                </div>
                <div class="input-group">
                    <label>Message to Room:</label>
                    <input type="text" id="multicastMsg" placeholder="Type room message..." 
                           onkeypress="if(event.key==='Enter') sendMulticast()">
                </div>
                <button onclick="sendMulticast()" id="multicastBtn" disabled>💬 Send to Room</button>
            </div>
        </div>
        
        <!-- Online Users -->
        <div class="online-users">
            <h3>👥 Online Clients (<span id="onlineCount">0</span>)</h3>
            <div class="user-list" id="onlineUsers">
                <div style="color: #999; text-align: center; padding: 20px;">
                    Fetching online users...
                </div>
            </div>
        </div>
        
        <!-- Messages Area -->
        <div class="messages-area">
            <div class="messages-header">
                <h3>📨 Messages</h3>
                <div>
                    <button onclick="exportMessages()">💾 Export</button>
                </div>
            </div>
            <div class="messages" id="messages">
                <div class="message system">
                    <div class="message-time">System</div>
                    <div class="message-content">Welcome! Connect to WebSocket server to start messaging.</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let ws;
        let myClientId = '';
        let currentRoom = '';
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        
        // Connect to WebSocket
        function connect() {
            // Generate random client ID
            myClientId = 'client_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            document.getElementById('clientId').textContent = myClientId;
            updateStatus('Connecting...', false);
            
            // Create WebSocket connection
            ws = new WebSocket(`ws://localhost:8080/ws?client_id=${myClientId}`);
            
            ws.onopen = function() {
                updateStatus('Connected ✓', true);
                addMessage('Connected to WebSocket server', 'system');
                enableButtons(true);
                reconnectAttempts = 0;
                
                // Auto join default room
                setTimeout(() => {
                    if (currentRoom === '') {
                        const defaultRoom = 'general';
                        document.getElementById('roomName').value = defaultRoom;
                        joinRoomByName(defaultRoom);
                    }
                }, 500);
                
                // Fetch online users periodically
                fetchOnlineUsers();
                setInterval(fetchOnlineUsers, 5000);
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (e) {
                    // If not JSON, treat as plain text
                    addMessage(event.data, 'broadcast');
                }
            };
            
            ws.onclose = function() {
                updateStatus('Disconnected ✗', false);
                addMessage('Disconnected from server', 'system');
                enableButtons(false);
                
                // Auto reconnect
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    addMessage(`Reconnecting in 3 seconds... (Attempt ${reconnectAttempts}/${maxReconnectAttempts})`, 'system');
                    setTimeout(connect, 3000);
                } else {
                    addMessage('Max reconnection attempts reached. Please refresh the page.', 'error');
                }
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
                addMessage('WebSocket error occurred', 'error');
            };
        }
        
        // Handle incoming messages
        function handleMessage(msg) {
            if (msg.type === 'error') {
                addMessage(`Error: ${msg.content}`, 'error');
                return;
            }
            
            // Determine message type
            if (msg.content) {
                let type = 'broadcast';
                if (msg.content.includes('[Private')) {
                    type = 'unicast';
                } else if (msg.content.includes('[Room')) {
                    type = 'multicast';
                }
                addMessage(msg.content, type);
            }
        }
        
        // Send Unicast message
        function sendUnicast() {
            const target = document.getElementById('unicastTarget').value.trim();
            const msg = document.getElementById('unicastMsg').value.trim();
            
            if (!target) {
                addMessage('Please enter a target Client ID', 'system');
                return;
            }
            
            if (!msg) {
                addMessage('Please enter a message', 'system');
                return;
            }
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'unicast',
                    to: target,
                    content: `[Private from ${myClientId}] ${msg}`,
                    sender: myClientId,
                    time: Date.now()
                };
                ws.send(JSON.stringify(message));
                addMessage(`🔵 To ${target}: ${msg}`, 'unicast');
                document.getElementById('unicastMsg').value = '';
            } else {
                addMessage('Not connected to server', 'error');
            }
        }
        
        // Send Broadcast message
        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value.trim();
            
            if (!msg) {
                addMessage('Please enter a message', 'system');
                return;
            }
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'broadcast',
                    content: `[Broadcast from ${myClientId}] ${msg}`,
                    sender: myClientId,
                    time: Date.now()
                };
                ws.send(JSON.stringify(message));
                addMessage(`🟣 Broadcast: ${msg}`, 'broadcast');
                document.getElementById('broadcastMsg').value = '';
            } else {
                addMessage('Not connected to server', 'error');
            }
        }
        
        // Join Room
        function joinRoom() {
            const room = document.getElementById('roomName').value.trim();
            if (!room) {
                addMessage('Please enter a room name', 'system');
                return;
            }
            joinRoomByName(room);
        }
        
        function joinRoomByName(room) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'join_room',
                    room: room,
                    sender: myClientId,
                    time: Date.now()
                };
                ws.send(JSON.stringify(message));
                currentRoom = room;
                document.getElementById('currentRoom').innerHTML = `<strong>${room}</strong>`;
                addMessage(`🏠 Joined room: ${room}`, 'system');
            }
        }
        
        // Leave Room
        function leaveRoom() {
            if (!currentRoom) {
                addMessage('You are not in any room', 'system');
                return;
            }
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'leave_room',
                    room: currentRoom,
                    sender: myClientId,
                    time: Date.now()
                };
                ws.send(JSON.stringify(message));
                addMessage(`🚪 Left room: ${currentRoom}`, 'system');
                currentRoom = '';
                document.getElementById('currentRoom').innerHTML = 'None';
            }
        }
        
        // Send Multicast message
        function sendMulticast() {
            const room = document.getElementById('roomName').value.trim() || currentRoom;
            const msg = document.getElementById('multicastMsg').value.trim();
            
            if (!room) {
                addMessage('Please enter a room name or join a room', 'system');
                return;
            }
            
            if (!msg) {
                addMessage('Please enter a message', 'system');
                return;
            }
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'multicast',
                    room: room,
                    content: `[Room ${room} from ${myClientId}] ${msg}`,
                    sender: myClientId,
                    time: Date.now()
                };
                ws.send(JSON.stringify(message));
                addMessage(`🟢 To room ${room}: ${msg}`, 'multicast');
                document.getElementById('multicastMsg').value = '';
            } else {
                addMessage('Not connected to server', 'error');
            }
        }
        
        // Fetch online users from API
        async function fetchOnlineUsers() {
            try {
                const response = await fetch('http://localhost:8080/api/clients');
                const data = await response.json();
                
                if (data.success && data.data) {
                    const clients = data.data.clients || [];
                    const count = data.data.count || 0;
                    document.getElementById('onlineCount').textContent = count;
                    
                    const userListDiv = document.getElementById('onlineUsers');
                    if (clients.length === 0) {
                        userListDiv.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">No other users online</div>';
                    } else {
                        userListDiv.innerHTML = clients.map(clientId => `
                            <div class="user-item ${clientId === myClientId ? 'current' : ''}" 
                                 onclick="selectTarget('${clientId}')">
                                ${clientId} ${clientId === myClientId ? '(You)' : ''}
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Failed to fetch online users:', error);
            }
        }
        
        // Select target for unicast
        function selectTarget(clientId) {
            document.getElementById('unicastTarget').value = clientId;
            addMessage(`📌 Selected target: ${clientId}`, 'system');
        }
        
        // Fill current client ID in target field
        function fillCurrentClientId() {
            document.getElementById('unicastTarget').value = myClientId;
            addMessage(`📌 Selected your own ID: ${myClientId}`, 'system');
        }
        
        // Send sample broadcast
        function sendSampleBroadcast() {
            const samples = [
                'Hello everyone! 👋',
                'System maintenance in 10 minutes ⚠️',
                'Welcome to the chat! 🎉',
                'Anyone here? 🤔',
                'Happy coding! 💻'
            ];
            const randomMsg = samples[Math.floor(Math.random() * samples.length)];
            document.getElementById('broadcastMsg').value = randomMsg;
            sendBroadcast();
        }
        
        // Add message to UI
        function addMessage(msg, type) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const time = new Date().toLocaleTimeString();
            messageDiv.innerHTML = `
                <div class="message-time">${time}</div>
                <div class="message-content">${escapeHtml(msg)}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Limit messages to 200
            while (messagesDiv.children.length > 200) {
                messagesDiv.removeChild(messagesDiv.firstChild);
            }
        }
        
        // Clear all messages
        function clearMessages() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '<div class="message system"><div class="message-time">System</div><div class="message-content">Messages cleared</div></div>';
            addMessage('Chat history cleared', 'system');
        }
        
        // Export messages
        function exportMessages() {
            const messages = document.getElementById('messages').innerHTML;
            const blob = new Blob([messages], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat_export_${Date.now()}.html`;
            a.click();
            URL.revokeObjectURL(url);
            addMessage('Chat exported successfully', 'system');
        }
        
        // Copy client ID
        function copyClientId() {
            navigator.clipboard.writeText(myClientId);
            addMessage('📋 Client ID copied to clipboard!', 'system');
        }
        
        // Reconnect
        function reconnect() {
            if (ws) ws.close();
            setTimeout(connect, 100);
        }
        
        // Update status UI
        function updateStatus(text, isConnected) {
            document.getElementById('statusText').textContent = text;
            const indicator = document.getElementById('statusIndicator');
            if (isConnected) {
                indicator.className = 'status-indicator connected';
            } else {
                indicator.className = 'status-indicator disconnected';
            }
        }
        
        // Enable/disable buttons
        function enableButtons(enabled) {
            const btns = ['unicastBtn', 'broadcastBtn', 'joinRoomBtn', 'leaveRoomBtn', 'multicastBtn', 'copyBtn'];
            btns.forEach(btnId => {
                const btn = document.getElementById(btnId);
                if (btn) btn.disabled = !enabled;
            });
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize on page load
        window.onload = connect;
    </script>
</body>
</html>
